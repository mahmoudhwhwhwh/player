</style>   <style>    
:root { --primary-color: #D80404; --live-color: #e62e2e; --menu-bg: #282828; }    
body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Tajawal', sans-serif !important; -webkit-tap-highlight-color: transparent; }    
#player-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

.controls-overlay.visible { opacity: 1; visibility: visible; pointer-events: auto; }

#center-controls { top: 50%; left: 50%; transform: translate(-50%, -50%); }

#settings-popup { position: absolute; bottom: 80px; width: 260px; background-color: var(--menu-bg); border-radius: 8px; z-index: 20; display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.1); }

.settings-close-btn, .settings-back-btn { cursor: pointer; color: #ccc; padding: 5px; }    
.settings-close-btn:hover, .settings-back-btn:hover { color: #fff; }    
.menu-item { display: flex; align-items: center; justify-content: flex-start; gap: 10px; padding: 12px 10px; border-radius: 5px; cursor: pointer; font-weight: 500; color: #fff; transition: background-color 0.2s ease; }

.menu-item .checkmark { width: 20px; height: 20px; visibility: hidden; }    
.menu-item.active .checkmark { visibility: visible; }    
.menu-item-bitrate, .menu-item-value { font-size: 0.9em; color: #aaa; margin-left: auto; }    
#player-logo, #telegram-link { position: absolute; z-index: 9; opacity: 0.8; transition: all 0.3s ease; }

</style>  </head>    
<body>

<script>    
document.addEventListener('DOMContentLoaded', () => {    
    const expandSvg = `<svg fill="currentColor" version="1.1" xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" viewBox="0 0 100 100"><g><path d="M22.661,20.5H36c1.104,0,2-0.896,2-2s-0.896-2-2-2H19c-1.104,0-2.5,1.276-2.5,2.381v17c0,1.104,0.896,2,2,2s2-0.896,2-2V24.876l16.042,15.791c0.391,0.391,1.027,0.586,1.539,0.586s1.086-0.195,1.477-0.586c0.781-0.781,0.812-2.237,0.031-3.019L22.661,20.5z"></path><path d="M83,16.5H66c-1.104,0-2,0.896,2,2s0.896,2,2,2h12.605L61.647,37.648c-0.781,0.781-0.781,2.142,0,2.923c0.39,0.391,0.902,0.633,1.414,0.633s0.774-0.171,1.164-0.562l16.274-16.5v11.738c0,1.104,0.896,2,2,2s2-0.896,2-2v-17C84.5,17.776,84.104,16.5,83,16.5z"></path><path d="M36.542,60.962L20.5,76.754V65.881c0-1.104-0.896-2-2-2s-2,0.896,2,2v17c0,1.104,1.396,1.619,2.5,1.619h17c1.104,0,2-0.896,2-2s-0.896-2-2-2H22.529L39.62,63.6c0.781-0.781,0.656-1.951-0.125-2.732C38.715,60.086,37.322,60.181,36.542,60.962z"></path><path d="M82.5,63.881c-1.104,0-2,0.896-2,2v11.606L64.226,60.962c-0.78-0.781-1.923-0.781-2.703,0c-0.781,0.781-0.719,1.856,0.062,2.638l17.152,16.9H66c-1.104,0-2,0.896-2,2s0.896,2,2,2h17c1.104,0,1.5-0.515,1.5-1.619v-17C84.5,64.776,83.604,63.881,82.5,63.881z"></path></g></svg>`;    
    const elements = {    
        video: document.getElementById('video'),    
        playerContainer: document.getElementById('player-container'),    
        centerControls: document.getElementById('center-controls'),    
        bottomControls: document.getElementById('bottom-controls-container'),    
        playPauseBtn: document.getElementById('play-pause-btn'),    
        playPauseCenterBtn: document.getElementById('play-pause-center-btn'),    
        muteBtn: document.getElementById('mute-btn'),    
        fullscreenBtn: document.getElementById('fullscreen-btn'),    
        timeDisplay: document.getElementById('time-display-container'),    
        progressPlayed: document.querySelector('.progress-played'),    
        progressBarContainer: document.querySelector('.progress-bar-container'),    
        settingsBtn: document.getElementById('settings-btn'),    
        settingsPopup: document.getElementById('settings-popup'),    
        settingsList: document.getElementById('settings-list'),    
        settingsTitle: document.querySelector('.settings-title'),    
        settingsBackBtn: document.querySelector('.settings-back-btn'),    
        settingsCloseBtn: document.querySelector('.settings-close-btn'),    
        loadingSpinner: document.getElementById('loading-spinner'),    
        errorOverlay: document.getElementById('error-overlay'),    
        errorTitle: document.getElementById('error-title'),    
        errorMessage: document.getElementById('error-message'),    
        seekBackwardBtn: document.getElementById('seek-backward-btn'),    
        seekForwardBtn: document.getElementById('seek-forward-btn'),    
        expandBtn: document.getElementById('expand-btn'),    
    };  let controlsTimeout, clickTimer, expandModeIndex = 0;    
const expandModes = ['contain', 'cover', 'fill'];    
elements.expandBtn.innerHTML = expandSvg;    const player = new shaka.Player(elements.video);
player.configure({
manifest: { dash: { ignoreMinBufferTime: true } },
streaming: { rebufferingGoal: 2, bufferingGoal: 10, alwaysStreamText: true },
abr: { defaultBandwidthEstimate: 3000000, enabled: true }
});

// ===============================================
// ★★★ الكود المُعدل والمُحسن يبدأ هنا ★★★
// ===============================================

async function initializeApp() {
const params = new URLSearchParams(window.location.search);
const channel = params.get('id');

let streamUrl = '';  
let clearKeys = {};  

switch (channel) {  
    case 'max1':  
        streamUrl = 'http://45.67.56.78/Sport2/index.fmp4.m3u8';  
        clearKeys = {  
            '7e9239c1982d984a002df3ed049d0756': '1b8a17598129a3618535c8fb05f103fe'  
        };  
        break;  
    case 'max2':  
        streamUrl = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';  
        clearKeys = {};  
        break;  
    case 'max3':  
        streamUrl = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';  
        clearKeys = {};  
        break;  
    case 'max4':  
        streamUrl = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';  
        clearKeys = {};  
        break;  
    default:  
        streamUrl = '';  
        clearKeys = {};  
}  

if (!streamUrl) {  
    showError("Error", "Channel not found");  
    return;  
}  

updateMuteButton();  

try {  
    player.configure({  
        drm: {  
            clearKeys: clearKeys  
        }  
    });  

    await player.load(streamUrl);  

    elements.loadingSpinner.style.display = 'none';  
    elements.video.play().catch(() => {  
        updatePlayButton();  
    });  

    showControls();  

} catch (error) {  
    let errorMessage = error.message;  
    if (error.code && shaka.util.Error.Code[error.code]) {  
        errorMessage = `Playback failed. (Shaka Error ${error.code})`;  
    }  
    showError('Playback Error', errorMessage);  
}

}

// ===============================================
// ★★★ نهاية الكود المُعدل ★★★
// ===============================================

function showError(title, message) {
elements.loadingSpinner.style.display = 'none';
elements.errorTitle.textContent = title;
elements.errorMessage.textContent = message;
elements.errorOverlay.style.display = 'flex';
feather.replace();
}
const showControls = () => {[elements.bottomControls, elements.centerControls].forEach(el => el.classList.add('visible')); clearTimeout(controlsTimeout); if (!elements.video.paused) { controlsTimeout = setTimeout(hideControls, 4000); }};
const hideControls = () => { if (elements.settingsPopup.style.display === 'block') return; [elements.bottomControls, elements.centerControls].forEach(el => el.classList.remove('visible')); };
const togglePlay = () => elements.video.paused ? elements.video.play() : elements.video.pause();
const updatePlayButton = () => {const icon = elements.video.paused ? 'play' : 'pause'; elements.playPauseBtn.innerHTML = <i data-feather="${icon}"></i>; elements.playPauseCenterBtn.innerHTML = <i data-feather="${icon}"></i>; feather.replace();};
function updateMuteButton() { const icon = elements.video.muted || elements.video.volume === 0 ? 'volume-x' : (elements.video.volume < 0.5 ? 'volume-1' : 'volume-2'); elements.muteBtn.innerHTML = <i data-feather="${icon}"></i>; feather.replace(); }
async function toggleFullscreen() {if (!document.fullscreenElement) {await elements.playerContainer.requestFullscreen();} else {await document.exitFullscreen();}}
function updateFullscreenIcon() {elements.fullscreenBtn.innerHTML = <i data-feather="${document.fullscreenElement ? 'minimize' : 'maximize'}"></i>; feather.replace();}
const formatTime = (timeInSeconds) => {if (isNaN(timeInSeconds) || timeInSeconds < 0) return '00:00'; const date = new Date(null); date.setSeconds(timeInSeconds); return date.toISOString().substr(14, 5);};
const toggleSettingsPopup = () => { clearTimeout(controlsTimeout); const popup = elements.settingsPopup; if (popup.style.display === 'block') { popup.style.display = 'none'; } else { popup.style.visibility = 'hidden'; popup.style.display = 'block'; const buttonRect = elements.settingsBtn.getBoundingClientRect(), containerRect = elements.playerContainer.getBoundingClientRect(), popupWidth = popup.offsetWidth; let popupLeft = buttonRect.left + (buttonRect.width / 2) - (popupWidth / 2); if (popupLeft < 10) popupLeft = 10; if (popupLeft + popupWidth > containerRect.width - 10) popupLeft = containerRect.width - popupWidth - 10; popup.style.left = ${popupLeft}px; popup.style.right = 'auto'; popup.style.visibility = 'visible'; showMainMenu(); } };
const showMainMenu = () => { const list = elements.settingsList; list.innerHTML = ''; elements.settingsTitle.textContent = 'الإعدادات'; elements.settingsBackBtn.style.display = 'none'; const qualityValue = player.getConfiguration().abr.enabled ? 'تلقائي' : ${player.getVariantTracks().find(t=>t.active)?.height}p; list.appendChild(createMenuItem('الجودة', 'sliders', () => showSubMenu('quality'), qualityValue)); if (player.getAudioLanguagesAndRoles().length > 1) { const audioValue = player.getAudioLanguages()[0].toLowerCase() === 'ar' ? 'العربية' : 'الإنجليزية'; list.appendChild(createMenuItem('الصوت', 'headphones', () => showSubMenu('audio'), audioValue)); } if (!player.isLive()) { const speedValue = player.getPlaybackRate() === 1 ? 'عادي' : ${player.getPlaybackRate()}x; list.appendChild(createMenuItem('السرعة', 'play-circle', () => showSubMenu('speed'), speedValue)); } feather.replace(); };
const showSubMenu = (type) => { const list = elements.settingsList; list.innerHTML = ''; elements.settingsBackBtn.style.display = 'block'; switch (type) { case 'quality': elements.settingsTitle.textContent = 'الجودة'; const isAbrEnabled = player.getConfiguration().abr.enabled, tracks = player.getVariantTracks().filter(t => t.type === 'variant'), activeTrack = tracks.find(t => t.active); list.appendChild(createSubMenuItem('تلقائي', isAbrEnabled, () => { player.configure('abr.enabled', true); toggleSettingsPopup(); })); [...new Set(tracks.map(t => t.height))].filter(Boolean).sort((a,b)=>b-a).forEach(h => { const trackForHeight = tracks.find(t => t.height === h), bitrate = (${Math.round(trackForHeight.bandwidth / 1000)} kbps); list.appendChild(createSubMenuItem(${h}p, !isAbrEnabled && activeTrack && activeTrack.height === h, () => { player.configure('abr.enabled', false); player.selectVariantTrack(trackForHeight, true); toggleSettingsPopup(); }, bitrate)); }); break; case 'audio': elements.settingsTitle.textContent = 'الصوت'; const currentAudioLang = player.getAudioLanguages()[0]; player.getAudioLanguagesAndRoles().forEach(track => { const langName = track.language.toLowerCase() === 'ar' ? 'العربية' : 'الإنجليزية'; list.appendChild(createSubMenuItem(langName, track.language === currentAudioLang, () => { player.selectAudioLanguage(track.language, track.role); })); }); break; case 'speed': elements.settingsTitle.textContent = 'السرعة'; const currentRate = player.getPlaybackRate(); [0.5, 0.75, 1, 1.25, 1.5, 2].forEach(rate => { list.appendChild(createSubMenuItem(rate === 1 ? 'عادي' : ${rate}x, rate === currentRate, () => { player.setPlaybackRate(rate); showMainMenu(); })); }); break; } feather.replace(); };
function createMenuItem(title, icon, action, value) { const item = document.createElement('li'); item.className = 'menu-item'; item.innerHTML = <i data-feather="${icon}"></i> <span>${title}</span> <span class="menu-item-value">${value}</span>; item.onclick = action; return item; }
function createSubMenuItem(title, isActive, action, bitrate = '') { const item = document.createElement('li'); item.className = menu-item ${isActive ? 'active' : ''}; item.innerHTML = <span class="menu-item-bitrate">${bitrate}</span> <span>${title}</span> <span class="checkmark" data-feather="check"></span>; item.onclick = action; return item; }
player.addEventListener('audiolanguagechanged', showMainMenu);
player.addEventListener('variantchanged', showMainMenu);
elements.video.addEventListener('ratechange', showMainMenu);
elements.video.addEventListener('play', () => { updatePlayButton(); showControls(); });
elements.video.addEventListener('pause', () => { updatePlayButton(); showControls(); });
elements.video.addEventListener('volumechange', updateMuteButton);
elements.playerContainer.addEventListener('mousemove', showControls);
elements.playPauseBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
elements.playPauseCenterBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
elements.seekBackwardBtn.addEventListener('click', (e) => { e.stopPropagation(); elements.video.currentTime -= 10; });
elements.seekForwardBtn.addEventListener('click', (e) => { e.stopPropagation(); elements.video.currentTime += 10; });
elements.muteBtn.addEventListener('click', (e) => { e.stopPropagation(); elements.video.muted = !elements.video.muted; });
elements.fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullscreen(); });
elements.expandBtn.addEventListener('click', (e) => { e.stopPropagation(); expandModeIndex = (expandModeIndex + 1) % expandModes.length; elements.video.style.objectFit = expandModes[expandModeIndex]; });
document.addEventListener('fullscreenchange', updateFullscreenIcon);
elements.video.addEventListener('timeupdate', () => { if (player.isLive() && (player.seekRange().end - player.seekRange().start < 60)) { elements.timeDisplay.innerHTML = <span style="color: var(--live-color); font-weight: bold;">●</span> مباشر; } else { const range = player.seekRange(); if (isFinite(range.end) && range.end > 0) { elements.timeDisplay.textContent = ${formatTime(elements.video.currentTime)}; } } });
elements.settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSettingsPopup(); });
elements.settingsCloseBtn.addEventListener('click', toggleSettingsPopup);
elements.settingsBackBtn.addEventListener('click', showMainMenu);
player.addEventListener('error', (event) => { console.error('Shaka Player Error:', event.detail); showError('حدث خطأ في المشغل', فشل تشغيل البث. (خطأ ${event.detail.code})); });
player.addEventListener('buffering', e => { elements.loadingSpinner.style.display = e.buffering ? 'block' : 'none'; });

initializeApp();

});
</script>
