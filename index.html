<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAYER</title>

<style>
body{
margin:0;
background:#111;
font-family:Tahoma;
color:#fff;
}

.header{
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
background:#1c1c1c;
}

.channels{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.channel{
background:#222;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}

.channel img{
width:100%;
height:120px;
object-fit:cover;
display:block;
}

.channel span{
display:block;
padding:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">PLAYER</div>

<div class="channels" id="channels"></div>

<script src="channels.js"></script>

<script>
const container = document.getElementById("channels");

channels.forEach(ch => {
container.innerHTML += `
<div class="channel" onclick="play('${ch.url}')">
<img src="${ch.logo}">
<span>${ch.name}</span>
</div>
`;
});

function play(url){
location.href =
"player.html?url=" + encodeURIComponent(url);
}
</script>

</body>
</html>
