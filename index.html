<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>live strem pro</title>
<style>
:root{--bg:#140022;--text:#fff;--border:#6d00c4;}
body{margin:0;font-family:Tahoma,sans-serif;background:var(--bg);color:var(--text);}
header{padding:20px;text-align:center;font-weight:bold;font-size:20px;background:rgba(0,0,0,0.2);}
.slider-container{height:180px;position:relative;overflow:hidden;margin:10px;border-radius:20px;border:2px solid var(--border);}
.slider-slide{position:absolute;width:100%;height:100%;opacity:0;transition:1s;}
.slider-slide.active{opacity:1;}
.slider-slide img{width:100%;height:100%;object-fit:cover;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:15px;}
.box{background:#000;border:2px solid var(--border);border-radius:20px;padding:10px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;}
.box img{width:60px;height:60px;object-fit:contain;}
.box-name{font-size:11px;font-weight:bold;margin-top:8px;}
.channels{display:none;padding:15px;}
.back{padding:12px;margin-bottom:15px;border-radius:10px;background:var(--border);text-align:center;cursor:pointer;font-weight:bold;}
.chan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.channel{background:#000;border:2px solid var(--border);border-radius:20px;overflow:hidden;text-align:center;cursor:pointer;text-decoration:none;display:block;}
.logo-area{height:100px;display:flex;justify-content:center;align-items:center;}
.logo-frame{width:70px;height:70px;border:2px solid var(--border);border-radius:15px;display:flex;justify-content:center;align-items:center;background:#fff;}
.logo-frame img{width:50px;height:50px;object-fit:contain;}
.channel-name{background:#1a1a1a;padding:8px;font-size:10px;font-weight:bold;color:#fff;}
</style>
</head>
<body>

<header>live strem pro</header>

<div class="slider-container">
    <div class="slider-slide active"><img src="https://iili.io/KHsnsyJ.jpg"></div>
    <div class="slider-slide"><img src="https://iili.io/BsK4nlp.png"></div>
    <div class="slider-slide"><img src="https://iili.io/BsK6ahg.png"></div>
    <div class="slider-slide"><img src="https://iili.io/BsKPVPj.png"></div>
    <div class="slider-slide"><img src="https://iili.io/BsKiSm7.png"></div>
    <div class="slider-slide"><img src="https://iili.io/BsKsXyB.png"></div>
</div>

<div id="sections" class="grid">
    <div class="box" onclick="openSection('MBC')"><img src="https://iili.io/CfZ046X.jpg"><div class="box-name">MBC</div></div>
    <div class="box" onclick="openSection('bein')"><img src="https://iili.io/CK5W75J.jpg"><div class="box-name">beIN SPORTS</div></div>
    <div class="box" onclick="openSection('VIP')"><img src="https://iili.io/CK5M0pR.png"><div class="box-name">VIP</div></div>
    <div class="box" onclick="openSection('kids')"><img src="https://iili.io/CKMqRff.jpg"><div class="box-name">KIDS</div></div>
    <div class="box" onclick="openSection('OSN')"><img src="https://iili.io/CKMa3sR.png"><div class="box-name">OSN</div></div>
    <div class="box" onclick="openSection('Alkass')"><img src="https://iili.io/CKMJBjf.png"><div class="box-name">Alkass</div></div>
    <div class="box" onclick="openSection('Alwan')"><img src="https://iili.io/CKGvbzx.png"><div class="box-name">Alwan</div></div>
    <div class="box" onclick="openSection('Eight')"><img src="https://iili.io/CKGPu6v.png"><div class="box-name">Eight</div></div>
    <div class="box" onclick="openSection('Shahid')"><img src="https://iili.io/CKMTUSs.jpg"><div class="box-name">Shahid sports</div></div>
    <div class="box" onclick="openSection('OSTORA TV')"><img src="https://iili.io/CKMvRBp.png"><div class="box-name">OSTORA Sports</div></div>
    <div class="box" onclick="openSection('live strem low')"><img src="https://iili.io/CK5M0pR.png"><div class="box-name">sports 1</div></div>
    <div class="box" onclick="openSection('live strem HD')"><img src="https://iili.io/CK5M0pR.png"><div class="box-name">Sports 2</div></div>
    <div class="box" onclick="openSection('live strem FHD')"><img src="https://iili.io/CK5M0pR.png"><div class="box-name">Sports 3</div></div>
    <div class="box" onclick="openSection('News')"><img src="https://iili.io/CKVqayB.jpg"><div class="box-name">News</div></div>
    <div class="box" onclick="openSection('STC')"><img src="https://iili.io/Cf0Rhp1.jpg"><div class="box-name">STC sports </div></div>
    <div class="box" onclick="openSection('Starz Play')"><img src="https://iili.io/Cf02bDP.jpg"><div class="box-name">Starz Play sport </div></div>
</div>

<div id="channels" class="channels">
    <div class="back" onclick="back()">⬅ رجوع</div>
    <div id="list" class="chan-grid"></div>
</div>

<script>
const data = {
    MBC: [{n:"MBC_1", u:"go:m1", i:"https://iili.io/CK7B3G9.png"}, {n:"MBC_2", u:"go:m2", i:"https://iili.io/CfZjicN.png"}],
    bein: [{n:"beIN 1", u:"go:b1", i:"https://iili.io/CK75BIe.png"}, {n:"beIN 2", u:"go:b2", i:"https://iili.io/CK75iZu.png"}],
    VIP: [{n:"beIN 1", u:"go:s1", i:"https://iili.io/CK75BIe.png"}, {n:"beIN 2", u:"go:s2", i:"https://iili.io/CK75iZu.png"}],
    kids: [{n:"kids 1", u:"go:k1", i:"https://iili.io/CKMqRff.jpg"}], 
    Alkass : [{n:"Alkass 1", u:"go:Al1", i:"https://iili.io/CKMJBjf.png"}], 
    Eight : [{n:"ثمانيه 1", u:"go:E1", i:"https://iili.io/CKGia0x.png"}],
    Alwan: [{n:"Alwan 1", u:"go:A1", i:"https://iili.io/CKGvbzx.png"}],
    OSN : [{n:"OSN 1", u:"go:O1", i:"https://iili.io/CKMa3sR.png"}],
    Shahid : [{n:"Shahid 1", u:"go:Sh1", i:"https://iili.io/CKMTUSs.jpg"}],
    "OSTORA TV": [{n:"OSTORA 1", u:"go:OS1", i:"https://iili.io/CKMvRBp.png"}],
    "live strem low": [{n:"beIN 1", u:"go:bL1", i:"https://iili.io/CK75BIe.png"}],
    "live strem HD": [{n:"beIN 1", u:"go:bH1", i:"https://iili.io/CK75BIe.png"}],
    "live strem FHD": [{n:"beIN 1", u:"go:bF1", i:"https://iili.io/CK75BIe.png"}],
    News: [{n:"News 1", u:"go:Ne1", i:"https://iili.io/CKVqayB.jpg"}],
    STC: [{n:"STC sports _1", u:"go:stc1", i:"https://iili.io/Cf0Rhp1.jpg"}], 
    "Starz Play": [{n:"Starz Play_1", u:"go:star1", i:"https://iili.io/Cf02bDP.jpg"}]
};

function openSection(name){
    document.getElementById("sections").style.display="none";
    document.getElementById("channels").style.display="block";
    let list=document.getElementById("list");
    list.innerHTML="";
    if(data[name]) {
        data[name].forEach(c=>{
            list.innerHTML+=`<a href="${c.u}" class="channel">
                <div class="logo-area"><div class="logo-frame"><img src="${c.i}"></div></div>
                <div class="channel-name">${c.n}</div>
            </a>`;
        });
    }
}
function back(){
    document.getElementById("sections").style.display="grid";
    document.getElementById("channels").style.display="none";
}
let slides=document.querySelectorAll(".slider-slide");
let i=0;
setInterval(()=>{
    slides[i].classList.remove("active");
    i=(i+1)%slides.length;
    slides[i].classList.add("active");
},3000);
</script>
</body>
</html>
